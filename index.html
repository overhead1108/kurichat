<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- PWA meta tags optimized for iOS 15+ -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="theme-color" content="#f6f6f6" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#1c1c1d" media="(prefers-color-scheme: dark)">
    <meta name="apple-mobile-web-app-title" content="Kurichat">
    <link rel="apple-touch-icon" sizes="192x192" href="icon-192.png">
    <link rel="apple-touch-icon" sizes="512x512" href="icon-512.png">
    <title>Kurichat</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="styles.css?v=3">
    <!-- Cropper.js for Profile Image Cropping -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css" rel="stylesheet">
</head>
<body>
    <!-- Login / Setup View -->
    <div id="view-login" class="view active auth-view">
        <div class="auth-container">
            <div class="logo-area">
                <h1>Kurichat</h1>
                <p>Local Network Chat</p>
            </div>
            
            <div class="auth-tabs" style="display:flex; margin-bottom: 20px; border-bottom: 2px solid var(--border-color);">
                <button id="tab-login" class="auth-tab active" style="flex:1; padding:10px; background:transparent; border:none; color:var(--text-color); border-bottom:2px solid var(--tg-blue); font-size:16px; margin-bottom:-2px; cursor:pointer; font-weight: 600;">Log In</button>
                <button id="tab-register" class="auth-tab" style="flex:1; padding:10px; background:transparent; border:none; color:var(--text-muted); font-size:16px; cursor:pointer;">Register</button>
            </div>
            
            <!-- Login Form -->
            <div id="form-login" class="auth-form" style="display:flex; flex-direction:column;">
                <div class="input-group">
                    <input type="text" id="login-username" placeholder="Username (Alphanumeric ID)" pattern="[a-zA-Z0-9]+" maxlength="20">
                </div>
                <div class="input-group">
                    <input type="password" id="login-pin" placeholder="Password (4-Digit PIN)" pattern="[0-9]*" inputmode="numeric" maxlength="4">
                </div>
                
                <button class="primary-btn" id="btn-login">Log In</button>
                <p id="login-error" class="error-msg"></p>
                <p class="auth-hint">Sign in securely over the local network.</p>
            </div>

            <!-- Register Form -->
            <div id="form-register" class="auth-form" style="display:none; flex-direction:column;">
                <div class="input-group">
                    <input type="text" id="reg-username" placeholder="Username (Alphanumeric ID)" pattern="[a-zA-Z0-9]+" maxlength="20">
                </div>
                <div class="input-group">
                    <input type="text" id="reg-displayname" placeholder="Display Name (Visible in Chat)" maxlength="30">
                </div>
                <div class="input-group">
                    <input type="password" id="reg-pin" placeholder="Password (4-Digit PIN)" pattern="[0-9]*" inputmode="numeric" maxlength="4">
                </div>
                
                <button class="primary-btn" id="btn-register">Register Account</button>
                <p id="register-error" class="error-msg"></p>
                <p class="auth-hint">Your username is used to log in, but your Display Name is what others will see.</p>
            </div>
        </div>
    </div>

    <!-- Cropper Modal -->
    <div id="view-cropper" class="modal view">
        <div class="modal-header">
            <button id="btn-cancel-crop" class="header-btn">Cancel</button>
            <h3>Crop Image</h3>
            <button id="btn-save-crop" class="header-btn strong">Done</button>
        </div>
        <div class="cropper-wrap">
            <img id="cropper-image" src="" alt="Picture">
        </div>
    </div>

    <!-- Compose Modal -->
    <div id="view-compose" class="modal view">
        <div class="modal-header">
            <button id="btn-cancel-compose" class="header-btn">Cancel</button>
            <h3>New Message</h3>
            <div style="width: 60px;"></div> <!-- Spacer to balance header -->
        </div>
        <div class="settings-content" style="padding: 20px;">
            <div class="input-group">
                <input type="text" id="compose-search-username" placeholder="Target @username" pattern="[a-zA-Z0-9]+" maxlength="20">
            </div>
            <button id="btn-start-dm" class="primary-btn" style="margin-top: 20px;">Start Chat</button>
            <p id="compose-msg" class="auth-hint" style="margin-top: 10px;"></p>
        </div>
    </div>

    <!-- Settings Modal -->
    <div id="view-settings" class="modal view">
        <div class="modal-header">
            <button id="btn-close-settings" class="header-btn">Done</button>
            <h3>Settings</h3>
            <button id="btn-logout" class="header-btn" style="color: #ff3b30;">Log Out</button>
        </div>
        <div class="settings-content" style="padding: 20px;">
            <div class="avatar-upload-wrap">
                <div class="avatar-preview" id="settings-avatar-preview">
                    <span id="settings-avatar-initial" style="font-size: 40px;">?</span>
                </div>
                <label class="avatar-btn">
                    Set Profile Photo
                    <input type="file" id="settings-avatar-input" accept="image/*" style="display:none">
                </label>
            </div>
            
            <p id="settings-username-handle" style="text-align:center; color:var(--tg-blue); font-size:16px; margin: 10px 0 0 0;">@username</p>
            
            <div class="input-group" style="margin-top: 20px;">
                <label style="color:var(--text-muted); font-size:14px; margin-bottom:5px; display:block;">Display Name</label>
                <input type="text" id="settings-displayname" placeholder="Display Name">
            </div>
            
            <button id="btn-save-settings" class="primary-btn" style="margin-top:20px;">Save Profile</button>
            <p id="settings-msg" class="auth-hint" style="margin-top:10px;"></p>
        </div>
    </div>

    <div id="app">
        <!-- Chat List View -->
        <div id="view-chatlist" class="view">
            <header class="app-header" style="justify-content: space-between;">
                <h2>Chats</h2>
                <div style="display: flex; gap: 15px;">
                    <button class="header-btn" id="btn-compose">
                        <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
                    </button>
                    <button class="header-btn" id="btn-settingsToggle">
                        <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.06-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61 l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41 h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.12,5.92,7.63,6.29L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.73,8.87 C2.62,9.08,2.66,9.34,2.86,9.48l2.03,1.58C4.84,11.36,4.8,11.69,4.8,12s0.02,0.64,0.06,0.94l-2.03,1.58 c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54 c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.44-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96 c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.49-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6 s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z"/></svg>
                    </button>
                </div>
            </header>
            <div class="chat-list" id="chat-list-container">
                <!-- Built dynamically from connected users -->
            </div>
        </div>

        <!-- Desktop Empty State (shown when no chat selected) -->
        <div id="desktop-empty-state" style="display:none;">
            <p>Select a chat to start messaging</p>
        </div>

        <!-- Chat Room View -->
        <div id="view-chatroom" class="view">
            <header class="app-header">
                <button class="header-btn" id="btn-back">
                    <svg viewBox="0 0 24 24" width="28" height="28" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
                    <span class="back-text">Chats</span>
                </button>
                <div class="chat-header-info">
                    <div class="chat-avatar-small" id="current-chat-avatar"></div>
                    <div class="chat-title-group">
                        <h2 id="current-chat-name">Name</h2>
                        <span class="chat-status" id="current-chat-username">@username</span>
                    </div>
                </div>
            </header>
            
            <div class="message-area" id="message-area">
                <!-- Messages populated by app.js -->
            </div>
            
            <div class="input-wrapper">
                <button class="attach-btn" id="btn-attach" aria-label="Attach File">
                    <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path></svg>
                    <input type="file" id="media-input" accept="image/*" style="display:none">
                </button>
                <div class="input-box" id="message-input" contenteditable="true" placeholder="Message"></div>
                <button id="btn-send" class="send-btn" aria-label="Send Message" style="display: none;">
                    <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path></svg>
                </button>
                <button id="btn-mic" class="mic-btn" aria-label="Voice Message">
                    <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="23"></line><line x1="8" y1="23" x2="16" y2="23"></line></svg>
                </button>
            </div>
        </div>
    </div>
    
    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
    <script src="app.js?v=3"></script>
</body>
</html>
